<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPN Oli | Только Telegram username</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* (стили без изменений - оставьте как в вашем файле) */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; background: linear-gradient(145deg, #d4eafe 0%, #a0d0f5 70%, #7bb9ed 100%); position: relative; }
    /* ... все остальные стили из вашего файла ... */
  </style>
</head>
<body>
  <div class="form-card">
    <div class="brand">
      <div class="brand-icon"><span>O</span></div>
      <div class="brand-text"><h2>VPN Oli·</h2></div>
    </div>

    <div class="form-title">
      <h1>Обратная связь</h1>
      <p>Оставьте ваш Telegram username — наш менеджер свяжется с вами</p>
    </div>

    <form id="feedbackForm" method="post"> <!-- добавлен method="post" -->
      <div class="input-group">
        <input type="text" class="input-field" id="telegram" name="telegram" placeholder="@username" required>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn"><span>✈️</span> Отправить</button>
    </form>

    <div id="statusMessage" class="status-message hidden"></div>

    <details class="telegram-note">
      <summary>как настроить VPN</summary>
      <p>⚙️ Скачайте приложение WireGuard на свое устройство, следуйте инструкции менеджера.</p>
    </details>

    <div style="position: fixed; bottom: 10px; right: 20px; background: rgba(255,255,255,0.4); backdrop-filter: blur(5px); padding: 0.4rem 1rem; border-radius: 40px; color: #1e5779; font-size: 0.8rem; border: 1px solid white;">
      ✦ Oli design · только Telegram ✦
    </div>
  </div>

  <script>
    (function() {
      const TELEGRAM_ENDPOINT = '/telegram-send.php';
      const DEMO_MODE = false;

      const form = document.getElementById('feedbackForm');
      const submitBtn = document.getElementById('submitBtn');
      const statusDiv = document.getElementById('statusMessage');

      function showStatus(text, type) {
        statusDiv.textContent = text;
        statusDiv.classList.remove('hidden', 'success', 'error');
        if (type === 'success') statusDiv.classList.add('success');
        else if (type === 'error') statusDiv.classList.add('error');
      }

      function hideStatus() {
        statusDiv.classList.add('hidden');
      }

      // Отладка: показываем, что скрипт загружен
      showStatus('✅ Скрипт загружен, демо-режим выключен', 'success');

      function validateForm(formData) {
        const telegram = formData.get('telegram')?.trim();
        if (!telegram || telegram.length < 2) return 'Введите Telegram username (минимум 2 символа)';
        if (telegram.includes(' ')) return 'Username не должен содержать пробелы';
        return null;
      }

      async function sendToTelegram(data) {
        if (DEMO_MODE) {
          console.log('DEMO MODE: данные не отправлены. Было бы отправлено:', Object.fromEntries(data));
          return { ok: true, demo: true };
        }

        const payload = JSON.stringify(Object.fromEntries(data));
        showStatus('📤 Отправка: ' + payload, 'success'); // отладка

        try {
          const response = await fetch(TELEGRAM_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: payload,
          });

          if (!response.ok) {
            const errText = await response.text();
            throw new Error(`Сервер вернул ошибку: ${response.status} — ${errText}`);
          }
          return { ok: true };
        } catch (error) {
          console.error('Ошибка при отправке:', error);
          return { ok: false, error: error.message };
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideStatus();
        showStatus('⏳ Обработка формы...', 'success'); // отладка

        const formData = new FormData(form);
        const validationError = validateForm(formData);
        if (validationError) {
          showStatus(validationError, 'error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.7';
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '⏳ Отправка...';

        try {
          const result = await sendToTelegram(formData);
          if (result.ok) {
            if (result.demo) {
              showStatus('✅ [ДЕМО] Заявка принята! (настройте endpoint для реальной отправки в Telegram)', 'success');
            } else {
              showStatus('✅ Спасибо! Ваш username отправлен в Telegram', 'success');
            }
            form.reset();
          } else {
            showStatus(`❌ Ошибка: ${result.error || 'неизвестная ошибка'}`, 'error');
          }
        } catch (err) {
          showStatus('❌ Критическая ошибка при отправке', 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.style.opacity = '1';
          submitBtn.innerHTML = originalText;
        }
      });

      document.getElementById('telegram').addEventListener('focus', hideStatus);
    })();
  </script>
</body>
</html>
